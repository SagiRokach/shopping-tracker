name: Check AliExpress

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 5'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run AliExpress check
        run: node scripts/check-aliexpress.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update AliExpress latest data
          file_pattern: data/aliexpress-latest.json
